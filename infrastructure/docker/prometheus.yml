global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'faas-platform'

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # FaaS API Gateway
  - job_name: 'faas-api-gateway'
    static_configs:
      - targets: ['api-gateway:3001']
    metrics_path: '/api/v1/metrics/prometheus'
    scrape_interval: 10s

  # FaaS Function Runner
  - job_name: 'faas-function-runner'
    static_configs:
      - targets: ['function-runner:8080']
    metrics_path: '/healthz'
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
