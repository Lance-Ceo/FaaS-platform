# docker-compose.override.yml
# Automatically merged with docker-compose.yml in development.
# Adds hot-reload, debug ports, and relaxed settings for local dev.

services:
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
      target: builder
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      - ./apps/api-gateway/src:/app/src:ro
      - ./packages/shared-types/src:/app/packages/shared-types/src:ro
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: builder
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./apps/frontend/src:/app/src:ro
    ports:
      - "3000:3000"

  function-runner:
    environment:
      - LOG_LEVEL=debug

  function-manager:
    environment:
      - LOG_LEVEL=debug
